<div class="product-section py-4">
  <div class="container">
    <div *ngIf="!isloading && products.length === 0" class="text-center py-5">
      <h4>No Products Found</h4>
    </div>
    <div class="row">

      <div *ngFor="let p of products" class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div class="card product-card h-100 border-0">

          <!-- Product Image -->
          <div class="product-img">
            <img [src]="p.imageUrl" class="card-img-top">
          </div>

          <!-- Product Details -->
          <div class="card-body">
            <h6 class="product-title">{{p.name}}</h6>

            <div style="color: rgb(94, 168, 237); font-weight: 500;" class="price">
              ₹{{p.unitPrice}}
            </div>

            <!-- Ratings -->
            <div class="rating">
              ⭐⭐⭐⭐☆
              <span>(120)</span>
            </div>
          </div>

          <!-- Button -->
          <div class="card-footer bg-white border-0 text-center">
            <button class="btn btn-cart w-100">
              Add to Cart
            </button>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>
